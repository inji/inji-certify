version: '3.8'

services:
  database:
    image: 'postgres:15'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./certify_init.sql:/docker-entrypoint-initdb.d/certify_init.sql
      - ./mimoto_init.sql:/docker-entrypoint-initdb.d/mimoto_init.sql
      - ./verify_init.sql:/docker-entrypoint-initdb.d/verify_init.sql
    networks:
      - network
    ports:
      - "5433:5432"

  certify:
    image: injistackdev2/inji-certify-with-plugins:develop
    user: root
    ports:
      - 8090:8090
    environment:
      - container_user=mosip
      - active_profile_env=default, csvdp-farmer
      - SPRING_CONFIG_NAME=certify
      - SPRING_CONFIG_LOCATION=/home/mosip/config/
      - enable_certify_artifactory=false
      - download_hsm_client=false
      - mosip_certify_domain_url=http://certify-nginx:80
    volumes:
      - ./config/certify-default.properties:/home/mosip/config/certify-default.properties
      - ./config/certify-csvdp-farmer.properties:/home/mosip/config/certify-csvdp-farmer.properties
      - ./config/certify-mock-mdl.properties:/home/mosip/config/certify-mock-mdl.properties
      - ./data/CERTIFY_PKCS12:/home/mosip/CERTIFY_PKCS12
      # This can be disabled if one uses plugins included in inji-certify-with-plugins docker image.
#      - ./loader_path/certify/:/home/mosip/additional_jars/
      # modify the below file to change the identity fields in the VC
      - ./config/farmer_identity_data.csv:/home/mosip/config/farmer_identity_data.csv
      - ./config/vp_request_config.json:/home/mosip/config/vp_request_config.json
    networks:
      - network
    depends_on:
      - database

  certify-nginx:
    image: nginx:stable
    ports:
      - 8091:80
    volumes:
      - ./certify-nginx.conf:/etc/nginx/conf.d/default.conf
      - ./config/mimoto-issuers-config.json:/config/server/mimoto-issuers-config.json
      - ./config/mimoto-trusted-verifiers.json:/config/server/mimoto-trusted-verifiers.json
      - ./config/credential-template.html:/config/server/credential-template.html
      - ./config/vp_request_config.json:/config/server/vp_request_config.json
    networks:
      - network
    depends_on:
      - certify


  mimoto-service:
    container_name: 'mimoto-service'
    image: mosipid/mimoto:0.20.0
    user: root
    ports:
      - '8099:8099'
    environment:
      - container_user=mosip
      - active_profile_env=default
      - SPRING_CONFIG_NAME=mimoto
      - SPRING_CONFIG_LOCATION=/home/mosip/
      - SPRING_CLOUD_BOOTSTRAP_LOCATION=/home/mosip/mimoto-bootstrap.properties
      - oidc_p12_password=dummypassword
      - WALLET_BINDING_PARTNER_API_KEY=dummywalletbindingpartnerapikey
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/inji_mimoto
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - GOOGLE_OAUTH_CLIENT_ID=clientId
      - GOOGLE_OAUTH_CLIENT_SECRET=clientSecret
    networks:
      - network
    volumes:
      - ./config/mimoto-default.properties:/home/mosip/mimoto-default.properties
      - ./config/mimoto-bootstrap.properties:/home/mosip/mimoto-bootstrap.properties
      - ./config/mimoto-issuers-config.json:/home/mosip/mimoto-issuers-config.json
      - ./config/mimoto-trusted-verifiers.json:/home/mosip/mimoto-trusted-verifiers.json
      - ./certs/oidckeystore.p12:/home/mosip/certs/oidckeystore.p12
    depends_on:
      - database

  inji-web:
    container_name: 'inji-web'
    image: mosipid/inji-web:0.15.0
    ports:
      - '3004:3004'
    environment:
      - DEFAULT_LANG=en
      - MIMOTO_URL=http://localhost:8099/v1/mimoto
    volumes:
      - ./config/mimoto-default.properties:/home/mosip/mimoto-default.properties
      - ./config/mimoto-issuers-config.json:/home/mosip/mimoto-issuers-config.json
      - ./config/mimoto-trusted-verifiers.json:/home/mosip/mimoto-trusted-verifiers.json
      - ./config/credential-template.html:/home/mosip/credential-template.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - mimoto-service
    networks:
      - network

  verify-service:
    container_name: verify-service
    image: injistack/inji-verify-service:0.17.0
    user: root
    ports:
      - "8095:8080"
    environment:
      - active_profile_env=default
      - DATABASE_HOST=database
      - DATABASE_PORT=5432
      - DATABASE_NAME=inji_verify
      - DATABASE_SCHEMA=verify
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - INJI_VP_REQUEST_LONG_POLLING_TIMEOUT=55000
      - INJI_VP_SUBMISSION_BASE_URL=http://verify-service:8080/v1/verify
      - INJI_DID_VERIFY_URI=did:web:verify-service:v1:verify
      - INJI_DID_VERIFY_PUBLIC_KEY_URI=did:web:verify-service:verify#key-0
      - INJI_KEYSTORE_FILE_PASS=mosip
      - INJI_VERIFY_REDIRECT_URI=http://verify-service:8080
    depends_on:
      - database
    networks:
      - network

networks:
  network:
    name: mosip_network
    external: true

volumes:
  cache:
    driver: local
  postgres-data:
