GeneratePreAuthCode:
   InjiCertify_GeneratePreAuthCode_Valid_Smoke_sid:
      endPoint: $INJICERTIFYBASEURL$/v1/certify/pre-authorized-data
      uniqueIdentifier: TC_preauth_GenerateCode_01
      description: Generate pre-authorized code with valid claims
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/GeneratePreAuthCode/GeneratePreAuthCode
      outputTemplate: injicertify/PreAuthCodeFlow/GeneratePreAuthCode/GeneratePreAuthCodeResult
      input: '{
          "credential_configuration_id": "InsuranceCredential",
          "claims": {
              "fullName": "Test User",
              "dob": "1990-01-15",
              "policyNumber": "POL123456789"
          },
          "expires_in": 600,
          "tx_code": "1234"
      }'
      output: '{
          "credential_offer_uri": "openid-credential-offer://"
      }'

