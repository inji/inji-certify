TokenExchangeNegative:
   # Unsupported grant type
   InjiCertify_TokenExchange_UnsupportedGrantType_Neg_sid:
      endPoint: $INJICERTIFYBASEURL$/oauth/token
      uniqueIdentifier: TC_preauth_TokenExchange_Neg_01
      description: Token exchange with unsupported grant type
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/TokenExchange/TokenExchange
      outputTemplate: injicertify/PreAuthCodeFlow/PreAuthNegative/PreAuthNegativeResult
      input: '{
          "grant_type": "authorization_code",
          "pre-authorized_code": "some_code"
      }'
      output: '{
          "error": "unsupported_grant_type"
      }'

   # Invalid pre-authorized code
   InjiCertify_TokenExchange_InvalidCode_Neg_sid:
      endPoint: $INJICERTIFYBASEURL$/oauth/token
      uniqueIdentifier: TC_preauth_TokenExchange_Neg_02
      description: Token exchange with invalid pre-authorized code
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/TokenExchange/TokenExchange
      outputTemplate: injicertify/PreAuthCodeFlow/PreAuthNegative/PreAuthNegativeResult
      input: '{
          "grant_type": "urn:ietf:params:oauth:grant-type:pre-authorized_code",
          "pre-authorized_code": "invalid_pre_auth_code_12345"
      }'
      output: '{
          "error": "invalid_grant"
      }'

   # Missing tx_code when required
   InjiCertify_TokenExchange_MissingTxCode_Neg_sid:
      endPoint: $INJICERTIFYBASEURL$/oauth/token
      uniqueIdentifier: TC_preauth_TokenExchange_Neg_03
      description: Token exchange without tx_code when it is required
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/TokenExchange/TokenExchange
      outputTemplate: injicertify/PreAuthCodeFlow/PreAuthNegative/PreAuthNegativeResult
      input: '{
          "grant_type": "urn:ietf:params:oauth:grant-type:pre-authorized_code",
          "pre-authorized_code": "$ID:InjiCertify_GeneratePreAuthCode_WithTxCode_Smoke_sid_preAuthCode$"
      }'
      output: '{
          "error": "tx_code_required"
      }'

   # Wrong tx_code value
   InjiCertify_TokenExchange_WrongTxCode_Neg_sid:
      endPoint: $INJICERTIFYBASEURL$/oauth/token
      uniqueIdentifier: TC_preauth_TokenExchange_Neg_04
      description: Token exchange with incorrect tx_code value
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/TokenExchange/TokenExchange
      outputTemplate: injicertify/PreAuthCodeFlow/PreAuthNegative/PreAuthNegativeResult
      input: '{
          "grant_type": "urn:ietf:params:oauth:grant-type:pre-authorized_code",
          "pre-authorized_code": "$ID:InjiCertify_GeneratePreAuthCode_WithTxCode_Smoke_sid_preAuthCode$",
          "tx_code": "wrongcode"
      }'
      output: '{
          "error": "tx_code_mismatch"
      }'

   # Pre-authorized code already used
   InjiCertify_TokenExchange_CodeAlreadyUsed_Neg_sid:
      endPoint: $INJICERTIFYBASEURL$/oauth/token
      uniqueIdentifier: TC_preauth_TokenExchange_Neg_05
      description: Token exchange with pre-authorized code that has already been used
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/TokenExchange/TokenExchange
      outputTemplate: injicertify/PreAuthCodeFlow/PreAuthNegative/PreAuthNegativeResult
      input: '{
          "grant_type": "urn:ietf:params:oauth:grant-type:pre-authorized_code",
          "pre-authorized_code": "$ID:InjiCertify_GeneratePreAuthCode_ForReuse_Smoke_sid_preAuthCode$"
      }'
      output: '{
          "error": "invalid_grant"
      }'

   # Pre-authorized code expired
   InjiCertify_TokenExchange_CodeExpired_Neg_sid:
      endPoint: $INJICERTIFYBASEURL$/oauth/token
      uniqueIdentifier: TC_preauth_TokenExchange_Neg_06
      description: Token exchange with expired pre-authorized code
      role: resident
      restMethod: post
      validityCheckRequired: true
      inputTemplate: injicertify/PreAuthCodeFlow/TokenExchange/TokenExchange
      outputTemplate: injicertify/PreAuthCodeFlow/PreAuthNegative/PreAuthNegativeResult
      input: '{
          "grant_type": "urn:ietf:params:oauth:grant-type:pre-authorized_code",
          "pre-authorized_code": "$ID:InjiCertify_GeneratePreAuthCode_ShortExpiry_Smoke_sid_preAuthCode$"
      }'
      output: '{
          "error": "pre_auth_code_expired"
      }'
